<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Work Assistant</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>LLM Work Assistant</h1>
      <button id="openSettings">設定</button>
    </header>

    <main class="layout">
      <aside class="panel">
        <section class="kbPanel">
          <h2>ナレッジベース</h2>
          <input id="kbTitle" placeholder="タイトル（例: 売買契約ひな型）" />
          <textarea id="kbContent" placeholder="条文テンプレートや定型文を入力"></textarea>
          <button id="addKb">保存</button>
          <ul id="kbList"></ul>
        </section>

        <section class="batchPanel">
          <h2>ファイル一括分析</h2>
          <label>入力ファイル(.txt)</label>
          <input id="inputFile" type="file" accept=".txt" />
          <label>プロンプトCSV</label>
          <input id="promptCsv" type="file" accept=".csv" />
          <button id="runBatch">実行</button>
        </section>
      </aside>

      <section class="chat">
        <div id="messages" class="messages"></div>
        <div class="composer">
          <textarea id="messageInput" placeholder="メッセージを入力（契約書作成の依頼も可能）"></textarea>
          <div class="actions">
            <button id="sendMessage">送信</button>
            <button id="generateContract">契約書ドラフト作成</button>
          </div>
        </div>
      </section>
    </main>

    <dialog id="settingsDialog">
      <h3>設定</h3>
      <label>Provider</label>
      <select id="provider">
        <option value="openai">OpenAI</option>
      </select>
      <label>Model</label>
      <input id="model" value="gpt-4o-mini" />
      <label>APIトークン（各ユーザー）</label>
      <input id="apiKey" type="password" placeholder="sk-..." />
      <div class="dialogActions">
        <button id="saveSettings">保存</button>
        <button id="closeSettings">閉じる</button>
      </div>
    </dialog>

    <script src="/assets/app.js"></script>
  </body>
</html>
